<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <title>My Web Page</title>
    <link rel="stylesheet" href="word.css">
    <link rel="stylesheet" href="positioning.css">
  
  </head>

<body>

 <img src="images/logo.png" class="logo"> 


 <div class="login-container">
   
    <h1 class="login-text">Login</h1>

    <form action="/login" method="POST">

      <input type="text" id="username" name="username" placeholder="Username" class="username-bar">
      <input type="password" id="password" name="password" placeholder="Password" class="password-bar">
      <p class="password-text"><b>Forgot your password?</b></p>


    <button type="submit" class="login-button">
    Submit
</button>
</form>
    

</div>


</body> 
    
</html>
